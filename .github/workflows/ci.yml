name: Terraform CI

on:
  pull_request:
    branches:
      - main

    paths:
      - 'environments/**'
      - 'modules/**'

permissions:
  pull-requests: write
  contents: read
  id-token: write

env:
  AWS_REGION: us-west-2
  TF_VERSION: 1.9.5

jobs:

  detect-changes:
    name: Detect Changed Environments

    runs-on: ubuntu-latest

    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Detect Changed Files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: |
            environments/**
            modules/**

      - name: Build Environment Matrix
        id: set-matrix
        run: |

          ENVIRONMENTS=()

          for file in ${{ steps.changed-files.outputs.all_changed_files }}
          do

            if [[ $file == environments/dev/* ]]; then
              ENVIRONMENTS+=("\"dev\"")
            fi

            if [[ $file == environments/test/* ]]; then
              ENVIRONMENTS+=("\"test\"")
            fi

            if [[ $file == environments/prod/* ]]; then
              ENVIRONMENTS+=("\"prod\"")
            fi

          done

          UNIQUE_ENVS=$(printf "%s\n" "${ENVIRONMENTS[@]}" | sort -u | paste -sd "," -)

          if [[ -z "$UNIQUE_ENVS" ]]; then
            UNIQUE_ENVS="\"dev\""
          fi

          echo "matrix={\"environment\":[${UNIQUE_ENVS}]}" >> $GITHUB_OUTPUT

  terraform-plan:
    name: Terraform-${{ matrix.environment }}

    needs: detect-changes

    runs-on: self-hosted

    strategy:
      fail-fast: false

      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}

    concurrency:
      group: terraform-${{ matrix.environment }}
      cancel-in-progress: true

    environment:
      name: ${{ matrix.environment }}

    defaults:
      run:
        shell: bash
        working-directory: ./environments/${{ matrix.environment }}

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: |
          terraform init -input=false

      - name: Terraform Format Check
        run: |
          terraform fmt -check -recursive

      - name: Terraform Validate
        run: |
          terraform validate

      - name: Terraform Plan
        run: |
          terraform plan \
            -input=false \
            -lock=true \
            -lock-timeout=300s \
            -no-color \
            -out=tfplan > plan.txt

      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ matrix.environment }}
          path: |
            environments/${{ matrix.environment }}/tfplan
            environments/${{ matrix.environment }}/plan.txt

      - name: Add PR Comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: terraform-${{ matrix.environment }}
          path: environments/${{ matrix.environment }}/plan.txt