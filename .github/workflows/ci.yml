name: Terraform CI

on:
  pull_request:
    branches:
      - main

    paths:
      - 'environments/**'
      - 'modules/**'

  workflow_dispatch:
    inputs:
      environment:
        description: 'Select Environment'
        required: true
        default: dev
        type: choice
        options:
          - dev
          - test
          - prod

env:
  AWS_REGION: us-west-2
  TF_VERSION: 1.9.5

jobs:

  detect-environment:
    name: Detect Changed Environment
    runs-on: ubuntu-latest

    outputs:
      environments: ${{ steps.filter.outputs.changes }}

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Detect Changed Environment
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            dev:
              - 'environments/dev/**'

            test:
              - 'environments/test/**'

            prod:
              - 'environments/prod/**'

  terraform:
    name: Terraform-${{ matrix.environment }}

    needs: detect-environment

    runs-on: self-hosted

    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(needs.detect-environment.outputs.environments, matrix.environment)

    strategy:
      fail-fast: false

      matrix:
        environment:
          - dev
          - test
          - prod

    concurrency:
      group: terraform-${{ matrix.environment }}
      cancel-in-progress: true

    permissions:
      contents: read

    defaults:
      run:
        shell: bash
        working-directory: ./environments/${{ matrix.environment }}

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: |
          terraform init -input=false

      - name: Terraform Format Check
        run: |
          terraform fmt -check -recursive

      - name: Terraform Validate
        run: |
          terraform validate

      - name: Terraform Plan
        run: |
          terraform plan \
            -input=false \
            -lock=true \
            -lock-timeout=300s \
            -out=tfplan

      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ matrix.environment }}
          path: environments/${{ matrix.environment }}/tfplan
          retention-days: 7